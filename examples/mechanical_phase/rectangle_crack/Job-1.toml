[[materials]]
name = "Material-2"
category = "PhaseField"
type = "DamageFeng"
data = [1.0, 1.0, 1.0, 0.0, 0.0, 2.0, 0.0, 2.0, 0.02]
#data = ["gc", "lc", "a1", "a2", "a3", "p", "xi", "c0", "gth"]

[[amplitudes]]
name = "Amp-1"
type = "TabularAmplitude"
data = [
    [0.0, 0.0],
    [1.0, 1.0]
]

