title = "Job-1"

[mesh]
type = "abaqus"
file = "rectangle_hole_quad4.inp"

[dof]
names = ["u1", "u2", "phi", "T"]
order = 1
family = "LAGRANGE"

[[bcs]]
name = "BC-1"
category = "DirichletBC"
type = ""
dof = ["u2"]
node_sets = ["Set-Y0"]
element_sets = []
value = 0.0

[[bcs]]
name = "BC-2"
category = "DirichletBC"
type = ""
dof = ["u1"]
node_sets = ["Set-X0Y0"]
element_sets = []
value = 0.0

[[bcs]]
name = "BC-3"
category = "DirichletBC"
type = ""
dof = ["u2"]
node_sets = ["Set-Y1"]
element_sets = []
value = 0.0

#[[bcs]]
#name = "BC-3"
#category = "NeumannBC"
#type = "Concentrated"
#dof = ["u2"]
#node_sets = ["Set-Y1"]
#element_sets = []
#value = 50.0

[[bcs]]
name = "BC-4"
category = "DirichletBC"
type = ""
dof = ["T"]
node_sets = ["Set-Y0"]
element_sets = []
value = 100.0

[[bcs]]
name = "BC-4"
category = "DirichletBC"
type = ""
dof = ["T"]
node_sets = ["Set-Y1"]
element_sets = []
value = 20.0

[solver]
type = "NonlinearSolver"
option = "NR"
total_time = 1000
start_time = 0.0
max_increment = 1000000
initial_dtime = 100
max_dtime = 100
min_dtime = 1

[[materials]]
name = "Material-1"
category = "Elastic"
type = "Isotropic"
data = [1.0e5, 0.25]

#[[materials]]
#name = "Material-1"
#category = "Plastic"
#type = "KinematicHardening"
#data = [100000.0, 0.25, 400.0, 1000.0]

[[materials]]
name = "Material-2"
category = "PhaseField"
type = "Damage"
data = [0.1, 0.1]

[[materials]]
name = "Material-3"
category = "Thermal"
type = "Isotropic"
data = [1.0, 1.0]

[[materials]]
name = "Material-4"
category = "MechanicalThermal"
type = "Expansion"
data = [1.0e-6]

[[amplitudes]]
name = "Amp-1"
type = "TabularAmplitude"
data = [
    [0.0, 0.0],
    [100.0, 1.0]
]

[[sections]]
name = "Section-1"
category = "SolidPhaseDamageThermal"
type = "PlaneStrain"
option = "SmallStrain"
element_sets = ["Set-All"]
material_names = ["Material-1", "Material-2", "Material-3", "Material-4"]
data = []
[sections.data_dict]
u_global = [1, 0, 0]
v_global = [0, 1, 0]
w_global = [0, 0, 1]
u_grain = [1, 0, 0]
v_grain = [0, 1, 0]
w_grain = [0, 0, 1]

[[outputs]]
type = "hdf5"
field_outputs = ["S", "E", "HFL", "SDV", "Energy"]
is_save = true
